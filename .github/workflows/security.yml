# Tayfa — Security scanning (mission §MANDATORY CI/CD).
# We process verified-identity + location data under GDPR/KVKK, so supply-chain
# and secret hygiene are blocking, not advisory. Runs on every PR to main and on
# a weekly schedule to catch newly disclosed advisories in unchanged code.
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — off the top-of-hour rush so the run is not throttled.
    - cron: '17 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Dependency audit — pnpm audit against the production dependency graph.
  # Fails on high/critical; moderate is surfaced but not blocking to avoid
  # transitive-only churn from blocking unrelated PRs.
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit (high+ blocks)
        run: pnpm audit --prod --audit-level high
      - name: Audit (moderate, advisory only)
        if: always()
        continue-on-error: true
        run: pnpm audit --audit-level moderate

  # ---------------------------------------------------------------------------
  # Secret scanning — gitleaks over the full history (push) / PR range.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so leaked-then-removed secrets are still caught
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for org accounts; optional for public/personal.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ---------------------------------------------------------------------------
  # Trivy filesystem scan — vulnerabilities + misconfig + exposed secrets across
  # the working tree (lockfiles, Dockerfile.postgres, config). Uploads SARIF.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      security-events: write # upload-sarif
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs scan (SARIF)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
      - name: Trivy fs scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

  # ---------------------------------------------------------------------------
  # CodeQL — static analysis for the JS/TS surface (BFF, web, mobile, packages).
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended
      # No compiled build step: TS is analyzed via the JS extractor (autobuild noop).
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
