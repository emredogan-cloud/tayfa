# Tayfa — Security scanning (mission §MANDATORY CI/CD).
# We process verified-identity + location data under GDPR/KVKK, so supply-chain
# and secret hygiene are blocking, not advisory. Runs on every PR to main and on
# a weekly schedule to catch newly disclosed advisories in unchanged code.
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:17 UTC — off the top-of-hour rush so the run is not throttled.
    - cron: '17 6 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Dependency audit — pnpm audit against the production dependency graph.
  # Fails on high/critical; moderate is surfaced but not blocking to avoid
  # transitive-only churn from blocking unrelated PRs.
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency audit (pnpm)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit (high+ blocks)
        run: pnpm audit --prod --audit-level high
      - name: Audit (moderate, advisory only)
        if: always()
        continue-on-error: true
        run: pnpm audit --audit-level moderate

  # ---------------------------------------------------------------------------
  # Secret scanning — gitleaks over the full history (push) / PR range.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so leaked-then-removed secrets are still caught
      - name: Install gitleaks
        run: |
          VER=8.24.3
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan git history for committed secrets
        # `detect` walks the full committed history (every tracked file, every
        # commit) — exactly what must never contain a real secret. We run gitleaks
        # directly because the marketplace action mis-computes the commit range on a
        # first push. `--redact` keeps any match out of the logs; `.gitleaks.toml`
        # allowlists template/placeholder files. (We scan history, not the working
        # tree, so node_modules fixtures don't produce false positives.)
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --log-opts="--all"

  # ---------------------------------------------------------------------------
  # Trivy filesystem scan — vulnerabilities + misconfig + exposed secrets across
  # the working tree (lockfiles, Dockerfile.postgres, config). Uploads SARIF.
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      security-events: write # upload-sarif
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        # Install the binary directly — the marketplace action's pinned tag was
        # unresolvable. Latest stable from the official install script.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin
          trivy --version
      - name: Trivy fs scan (SARIF, non-blocking upload)
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed \
            --skip-dirs node_modules --skip-dirs assets --skip-dirs .git \
            --format sarif --output trivy-results.sarif . || true
      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
      - name: Trivy fs scan (fail on HIGH/CRITICAL)
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --ignore-unfixed \
            --skip-dirs node_modules --skip-dirs assets --skip-dirs .git \
            --exit-code 1 .

  # ---------------------------------------------------------------------------
  # CodeQL — static analysis for the JS/TS surface (BFF, web, mobile, packages).
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
          queries: security-extended
      # No compiled build step: TS is analyzed via the JS extractor (autobuild noop).
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
